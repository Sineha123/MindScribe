<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindScribe Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: true });
  </script>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">MindScribe</p>
      <h1>Generate notes and manage saved projects in one place.</h1>
      <p class="hero-copy">Paste your text, turn it into notes, and keep the best results ready for later.</p>
    </section>

    <section class="workspace">
      <section class="panel composer-panel">
        <h2>Text Input</h2>
        <textarea id="note-input" placeholder="Paste your text here..."></textarea>

        <div class="button-row">
          <button id="generate-btn" class="primary-btn" type="button">Generate Notes</button>
          <button id="save-btn" class="secondary-btn" type="button" disabled>Save Project</button>
          <button id="clear-btn" class="ghost-btn" type="button">Clear</button>
        </div>

        <p id="status-message" class="status-message" aria-live="polite"></p>

        <section class="ai-section" aria-label="AI assistant">
          <div class="panel-heading">
            <h2>AI Assistant</h2>
          </div>
          <div class="button-row ai-actions">
            <button id="ai-summary-btn" class="secondary-btn" type="button">AI Summary</button>
            <button id="ai-explain-btn" class="ghost-btn" type="button">Explain</button>
          </div>
          <div class="ai-question-row">
            <input id="ai-question-input" type="text" placeholder="Ask a question about your content..." />
            <button id="ai-ask-btn" class="primary-btn" type="button">Ask</button>
          </div>
          <div id="ai-output" class="ai-output">AI answers will appear here.</div>
        </section>
      </section>

      <section class="panel notes-panel">
        <div class="panel-heading">
          <h2>Generated Notes</h2>
        </div>
        <div class="button-row voice-controls">
          <button id="read-btn" class="primary-btn" type="button" disabled>Read Notes</button>
          <button id="pause-btn" class="ghost-btn" type="button" disabled>Pause</button>
          <button id="resume-btn" class="ghost-btn" type="button" disabled>Resume</button>
          <button id="stop-btn" class="ghost-btn" type="button" disabled>Stop</button>
        </div>
        <div id="notes-output" class="notes-output"></div>

        <section class="charts-section" aria-label="Keyword visualization">
          <h2>Keyword Visualization</h2>
          <div class="charts-grid">
            <div class="chart-card">
              <canvas id="barChart"></canvas>
            </div>
            <div class="chart-card">
              <canvas id="pieChart"></canvas>
            </div>
          </div>
        </section>

        <section class="flow-section" aria-label="System flow">
          <h2>System Flow</h2>
          <div id="flowchart" class="flowchart-card"></div>
        </section>

        <section class="graph-section" aria-label="Concept graph">
          <h2>Concept Graph</h2>
          <div class="graph-card">
            <svg id="graph" width="800" height="500"></svg>
          </div>
        </section>
      </section>

      <section class="panel projects-panel">
        <div class="panel-heading">
          <h2>Saved Projects</h2>
        </div>
        <div id="projects-list" class="projects-list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
