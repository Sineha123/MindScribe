<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindScribe Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">MindScribe</p>
      <h1>Generate notes and manage saved projects in one place.</h1>
      <p class="hero-copy">Paste your text, turn it into notes, and keep the best results ready for later.</p>
    </section>

    <section class="workspace">
      <section class="panel composer-panel">
        <h2>Text Input</h2>
        <textarea id="note-input" placeholder="Paste your text here..."></textarea>

        <div class="button-row">
          <button id="generate-btn" class="primary-btn" type="button">Generate Notes</button>
          <button id="save-btn" class="secondary-btn" type="button" disabled>Save Project</button>
          <button id="clear-btn" class="ghost-btn" type="button">Clear</button>
        </div>

        <p id="status-message" class="status-message" aria-live="polite"></p>
      </section>

      <section class="panel notes-panel">
        <div class="panel-heading">
          <h2>Generated Notes</h2>
        </div>
        <div class="button-row voice-controls">
          <button id="read-btn" class="primary-btn" type="button" disabled>Read Notes</button>
          <button id="pause-btn" class="ghost-btn" type="button" disabled>Pause</button>
          <button id="resume-btn" class="ghost-btn" type="button" disabled>Resume</button>
          <button id="stop-btn" class="ghost-btn" type="button" disabled>Stop</button>
        </div>
        <div id="notes-output" class="notes-output"></div>
      </section>

      <section class="panel projects-panel">
        <div class="panel-heading">
          <h2>Saved Projects</h2>
        </div>
        <div id="projects-list" class="projects-list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
